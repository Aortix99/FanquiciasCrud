services:
  db:
    image: postgres:17
    container_name: franchises-db
    environment:
      POSTGRES_DB: franchises
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Puerto 5433 en el host evita choque con PostgreSQL local (muy común en Windows)
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d franchises"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franchises
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Perfil obligatorio: asegura conexion a Postgres interno (servicio db)
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/franchises
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"

volumes:
  postgres_data:

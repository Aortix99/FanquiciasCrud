# Perfil usado solo en Docker Compose (servicio api + db en la misma red).
# Evita depender del default de application.properties (Supabase) si algo no inyecta env.
spring.datasource.url=jdbc:postgresql://db:5432/franchises
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
